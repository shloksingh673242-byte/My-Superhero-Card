<html>
    <head>
        <title>My Superhero Card</title>
    <style>

       body {background-color: darkblue;
        color: white;
    font-family: Arial, Sans-serif;}
    
    .hero-name {font-size: 60px;
    font-weight: bold;
color: yellow;
text-shadow: 3px 3px orange;}

.tagline {font-style: italic;
color: lightblue;
text-transform: capitalize;}

.label {text-transform; uppercase;
text-decoration: underline;
color: coral;}

.power {font-weight: bold;
color: lightgreen}

.weakness {text-decoration: line-through;
color: gray;}

.badge {font-size: 28 px;
font-weight: bold;
color: gold;
transform: rotate(15deg);}

.made-by {color: coral;
    font-style:italic;}
    </style>
    </head>

    <body>
        <h1 class="hero-name">Thunder Kid</h1>
        <p class="tagline">The most powerful hero in school</p>

        <h2 class="label">Super Powers</h2>
        <p class="power">Can run faster than a cheetah</p>
        <p class="power">Can lift a school bus</p>

        <h2 class="label">weakness</h2>
        <p class="weakness">Math Homework</p>
        <p class="weakness">Brocolli</p>

        <p class="badge">Top Hero</p>

        <p class="made-by">Created by______________</p>
    </body>
</html>
